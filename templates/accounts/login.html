{% extends 'base.html' %}

{% block title %}Sign In - EventPass{% endblock %}

{% block content %}
<div class="row justify-content-center my-5 animated-fade-in">
    <div class="col-lg-5 col-md-8">
        <div class="card card-custom p-4 shadow-lg">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-ticket-simple text-indigo fa-3x mb-3" style="color: var(--primary-color);"></i>
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Sign in to your EventPass account to book tickets</p>
                </div>
                
                <form method="POST" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" name="username" id="id_username" class="form-control border-start-0 bg-light" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" name="password" id="id_password" class="form-control border-start-0 bg-light" placeholder="Enter password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100 py-2.5 fw-bold mb-3">
                        Sign In <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <p class="small text-muted mb-0">Don't have an account? <a href="{% url 'register' %}" class="fw-semibold text-decoration-none" style="color: var(--primary-color);">Register Here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
